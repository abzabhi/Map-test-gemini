<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Live Layup Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Courier New', Courier, monospace; background: #0f1115; color: #c8cdd6; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        #ui-panel {
            position: fixed; top: 10px; left: 10px; z-index: 1000;
            background: rgba(15, 17, 21, 0.95); padding: 15px; border-radius: 8px;
            border: 1px solid #1e2330; width: 320px; box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            box-sizing: border-box; max-height: 90vh; overflow-y: auto;
        }
        input[type="text"], select {
            width: 100%; box-sizing: border-box; background: #0a0c10; border: 1px solid #1e2330;
            color: #4ade80; padding: 8px; margin-bottom: 10px; border-radius: 4px; font-family: inherit;
        }
        button {
            width: 100%; background: #4ade80; color: #0f1115; border: none; padding: 10px;
            font-weight: bold; cursor: pointer; border-radius: 4px; font-family: inherit; margin-bottom: 10px;
        }
        button:hover { background: #22c55e; }
        .btn-secondary { background: #3498db; color: #fff; }
        .btn-secondary:hover { background: #2980b9; }
        #btnSearchHere {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; width: auto; padding: 12px 24px; box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            border-radius: 30px; background: #f1c40f; color: #000;
        }
        #btnSearchHere:hover { background: #f39c12; }
        .stats { font-size: 12px; margin-top: 10px; display: none; }
        .stat-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #1e2330; }
        .val { color: #4ade80; font-weight: bold; }
        #status { font-size: 11px; color: #f59e0b; margin-bottom: 10px; text-align: center; }
        .toggle-row { display: flex; align-items: center; margin-bottom: 10px; display: none; }
        .toggle-row input { margin-right: 8px; }
        .tee-icon { background:#d0d8e0; border:2px solid #fff; border-radius:50%; box-shadow: 0 0 4px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div id="ui-panel">
    <div id="status">Enter Course & Location</div>
    <input type="text" id="cityInput" placeholder="City, State (e.g. London, ON)">
    <input type="text" id="courseInput" placeholder="Course Name (e.g. Forest City)">
    
    <button id="btnFind" onclick="locateCourse()">1. Locate Course</button>
    <button id="btnDownload" class="btn-secondary" onclick="downloadDataFromBounds()" style="display:none;">2. Download Data Here</button>
    
    <select id="holeSelect" style="display:none;" onchange="selectHole()">
        <option value="">-- Select Hole --</option>
    </select>

    <div class="toggle-row" id="gpsToggleRow">
        <input type="checkbox" id="gpsToggle" onchange="toggleGPS()">
        <label for="gpsToggle" style="font-size: 12px; color: #4ade80; cursor: pointer;">Use Live GPS</label>
    </div>

    <div id="statsPanel" class="stats">
        <div class="stat-row"><span id="lblSeg1">Start to Target:</span><span class="val" id="valSeg1">-- yds</span></div>
        <div class="stat-row"><span>Target to Green:</span><span class="val" id="valSeg2">-- yds</span></div>
        <div class="stat-row" style="border:none; margin-top:4px;"><span>Total Distance:</span><span class="val" id="valTotal">-- yds</span></div>
        <div style="font-size: 10px; color: #8899aa; margin-top: 8px; text-align: center;">Click map for layup. Drag white tee to shift start.</div>
    </div>
</div>

<button id="btnSearchHere" onclick="searchHere()">Search Map Area</button>

<div id="map"></div>

<script>
    const map = L.map('map', { zoomControl: false }).setView([43.034, -81.168], 14);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        maxZoom: 20, attribution: 'Esri'
    }).addTo(map);

    const GC = { fairway: '#7ec850', green: '#28a050', tee: '#d0d8e0', bunker: '#c9a84c', water_hazard: '#5b9bd5', rough: '#4a7a28' };
    
    let courseHoles = {};
    let mapLayers = [];
    let courseMarkers = [];
    let activePath = null;
    let layupMarker = null;
    let teeMarker = null;
    
    let currentHoleKey = null;
    let activeTeePt = null;
    let targetPt = null;

    let userMarker = null;
    let userCoords = null;
    let gpsWatchId = null;

    function setStatus(msg, color = '#f59e0b') {
        const el = document.getElementById('status');
        el.innerText = msg;
        el.style.color = color;
    }

    async function locateCourse() {
        const city = document.getElementById('cityInput').value;
        const course = document.getElementById('courseInput').value;
        if (!city || !course) return setStatus('Enter both city and course.', '#f87171');

        setStatus('Locating city...', '#4ade80');
        const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(city)}&format=json&limit=1`);
        const geoData = await geoRes.json();
        if (!geoData.length) return setStatus('City not found.', '#f87171');

        setStatus('Finding course on map...', '#4ade80');
        const safeName = course.replace(/"/g, '\\"');
        const overpassQ = `[out:json][timeout:15];
        (
          node["leisure"="golf_course"]["name"~"${safeName}",i](around:50000, ${geoData[0].lat}, ${geoData[0].lon});
          way["leisure"="golf_course"]["name"~"${safeName}",i](around:50000, ${geoData[0].lat}, ${geoData[0].lon});
          relation["leisure"="golf_course"]["name"~"${safeName}",i](around:50000, ${geoData[0].lat}, ${geoData[0].lon});
        ); out center;`;
        
        try {
            const osmRes = await fetch('https://overpass-api.de/api/interpreter', { method: 'POST', body: overpassQ });
            const osmData = await osmRes.json();

            document.getElementById('btnDownload').style.display = 'block';

            if (!osmData.elements || !osmData.elements.length) {
                map.setView([geoData[0].lat, geoData[0].lon], 12);
                return setStatus('Name not found. Panned to city. Pan manually & use Search Area.', '#f59e0b');
            }

            const center = osmData.elements[0].center || osmData.elements[0];
            map.setView([center.lat, center.lon], 16);
            setStatus('Course located. Click Download or Search Area.', '#4ade80');
        } catch (err) {
            setStatus('Error locating course.', '#f87171');
        }
    }

    async function searchHere() {
        setStatus('Searching for courses in view...', '#4ade80');
        courseMarkers.forEach(m => map.removeLayer(m));
        courseMarkers = [];

        const bounds = map.getBounds();
        const overpassQ = `[out:json][timeout:15];
        (
          nwr["leisure"="golf_course"](${bounds.getSouth()},${bounds.getWest()},${bounds.getNorth()},${bounds.getEast()});
        ); out center;`;

        try {
            const res = await fetch('https://overpass-api.de/api/interpreter', { method: 'POST', body: overpassQ });
            const data = await res.json();
            
            if (!data.elements.length) return setStatus('No courses found in this area.', '#f87171');
            
            data.elements.forEach(e => {
                const lat = e.center ? e.center.lat : e.lat;
                const lon = e.center ? e.center.lon : e.lon;
                const name = (e.tags && e.tags.name) ? e.tags.name : "Unnamed Course";
                
                const marker = L.marker([lat, lon]).addTo(map);
                marker.bindPopup(`<b>${name}</b><br><button onclick="downloadCourseData(${lat}, ${lon})" style="margin-top:5px; padding:5px;">Load Course</button>`);
                courseMarkers.push(marker);
            });
            setStatus(`Found ${data.elements.length} courses. Click a pin to load.`, '#4ade80');
        } catch (err) {
            setStatus('Search area error.', '#f87171');
        }
    }

    function downloadDataFromBounds() {
        const center = map.getCenter();
        downloadCourseData(center.lat, center.lng);
    }

    async function downloadCourseData(lat, lon) {
        setStatus('Downloading course geometry...', '#3498db');
        map.closePopup();
        courseMarkers.forEach(m => map.removeLayer(m));
        
        // 2000m radius targeted fetch to avoid pulling adjacent independent courses
        const overpassQ = `[out:json][timeout:25];
        (
          way["golf"](around:1500, ${lat}, ${lon});
          node["golf"](around:1500, ${lat}, ${lon});
          relation["type"="golf_hole"](around:1500, ${lat}, ${lon});
        ); out body; >; out skel qt;`;

        try {
            const res = await fetch('https://overpass-api.de/api/interpreter', { method: 'POST', body: overpassQ });
            const data = await res.json();

            if (!data.elements.length) return setStatus('No golf features found at this location.', '#f87171');

            processOSM(data.elements);
            document.getElementById('btnDownload').style.display = 'none';
            document.getElementById('gpsToggleRow').style.display = 'flex';
        } catch (err) {
            setStatus('Data download failed.', '#f87171');
        }
    }

    function processOSM(elements) {
        mapLayers.forEach(l => map.removeLayer(l));
        mapLayers = [];
        courseHoles = {};
        const nodes = {};
        const features = [];

        elements.forEach(e => { if (e.type === 'node') nodes[e.id] = [e.lat, e.lon]; });

        elements.forEach(e => {
            if (!e.tags || !e.tags.golf) return;
            let coords = [];
            if (e.type === 'way' && e.nodes) coords = e.nodes.map(id => nodes[id]).filter(Boolean);
            else if (e.type === 'node') coords = [nodes[e.id]];
            if (!coords.length) return;

            features.push({ type: e.tags.golf, coords: coords, ref: e.tags.ref, course: e.tags.course || 'Main' });

            if (e.type === 'way') {
                const poly = L.polygon(coords, { color: GC[e.tags.golf] || '#556', weight: 1, fillOpacity: 0.5 }).addTo(map);
                mapLayers.push(poly);
            }

            const ref = e.tags.ref;
            if (ref) {
                const track = e.tags.course || 'Main';
                const key = `${track}_${ref}`;
                
                if (!courseHoles[key]) courseHoles[key] = { track, ref };
                if (e.tags.golf === 'tee') courseHoles[key].tee = coords[0];
                if (e.tags.golf === 'green') courseHoles[key].green = getCenter(coords);
                if (e.tags.golf === 'hole') courseHoles[key].line = coords;
            }
        });

        // Handshake missing greens
        const unreffedGreens = features.filter(f => f.type === 'green' && !f.ref);
        Object.keys(courseHoles).forEach(key => {
            const h = courseHoles[key];
            if (h.line) {
                if (!h.tee) h.tee = h.line[0];
                if (!h.green) {
                    const endPt = h.line[h.line.length - 1];
                    let closest = endPt, minDist = 50; 
                    unreffedGreens.forEach(g => {
                        const center = getCenter(g.coords);
                        const dist = map.distance(endPt, center);
                        if (dist < minDist) { minDist = dist; closest = center; }
                    });
                    h.green = closest;
                }
            }
        });

        populateDropdown();
    }

    function populateDropdown() {
        const select = document.getElementById('holeSelect');
        select.innerHTML = '<option value="">-- Select Hole --</option>';
        
        const validHoles = Object.keys(courseHoles)
            .filter(k => courseHoles[k].tee && courseHoles[k].green)
            .sort((a, b) => {
                const numA = parseInt(courseHoles[a].ref);
                const numB = parseInt(courseHoles[b].ref);
                if (courseHoles[a].track !== courseHoles[b].track) return courseHoles[a].track.localeCompare(courseHoles[b].track);
                return numA - numB;
            });

        if (!validHoles.length) return setStatus('Incomplete geometry. Holes missing tees/greens.', '#f87171');

        validHoles.forEach(key => {
            const h = courseHoles[key];
            const opt = document.createElement('option');
            opt.value = key;
            opt.innerText = h.track !== 'Main' ? `${h.track} - Hole ${h.ref}` : `Hole ${h.ref}`;
            select.appendChild(opt);
        });

        select.style.display = 'block';
        setStatus(`Mapped ${validHoles.length} holes.`, '#4ade80');
    }

    function selectHole() {
        const key = document.getElementById('holeSelect').value;
        if (!key) { currentHoleKey = null; return; }
        
        currentHoleKey = key;
        targetPt = null; 
        const h = courseHoles[key];
        
        activeTeePt = L.latLng(h.tee[0], h.tee[1]);

        if (!userCoords) map.setView(activeTeePt, 18);

        if (layupMarker) map.removeLayer(layupMarker);
        if (teeMarker) map.removeLayer(teeMarker);
        
        const teeIcon = L.divIcon({ className: 'tee-icon', iconSize: [14, 14] });
        teeMarker = L.marker(activeTeePt, { icon: teeIcon, draggable: true, zIndexOffset: 1000 }).addTo(map);
        
        teeMarker.on('dragend', function(e) {
            activeTeePt = e.target.getLatLng();
            updatePathsAndDistances();
        });

        updatePathsAndDistances();
    }

    map.on('click', function(e) {
        if (!currentHoleKey) return;
        targetPt = e.latlng;
        if (!layupMarker) layupMarker = L.circleMarker(targetPt, { color: '#e74c3c', radius: 6, fillOpacity: 1 }).addTo(map);
        else layupMarker.setLatLng(targetPt);
        updatePathsAndDistances();
    });

    function updatePathsAndDistances() {
        if (!currentHoleKey) return;
        const green = courseHoles[currentHoleKey].green;
        const startPt = userCoords ? userCoords : activeTeePt;
        const startLabel = userCoords ? "You" : "Tee";

        if (activePath) map.removeLayer(activePath);

        if (targetPt) {
            activePath = L.polyline([startPt, targetPt, green], { color: '#f1c40f', dashArray: '5, 5', weight: 3 }).addTo(map);
            const d1 = Math.round(map.distance(startPt, targetPt) * 1.09361);
            const d2 = Math.round(map.distance(targetPt, green) * 1.09361);
            updateUI(d1, d2, d1 + d2, startLabel);
        } else {
            activePath = L.polyline([startPt, green], { color: '#f1c40f', dashArray: '5, 5', weight: 3 }).addTo(map);
            const dist = Math.round(map.distance(startPt, green) * 1.09361);
            updateUI(dist, 0, dist, startLabel);
        }
    }

    function updateUI(seg1, seg2, total, startLabel) {
        document.getElementById('statsPanel').style.display = 'block';
        document.getElementById('lblSeg1').innerText = `${startLabel} to Target:`;
        document.getElementById('valSeg1').innerText = seg1 + ' yds';
        document.getElementById('valSeg2').innerText = seg2 > 0 ? seg2 + ' yds' : '-- yds';
        document.getElementById('valTotal').innerText = total + ' yds';
    }

    function toggleGPS() {
        const useGPS = document.getElementById('gpsToggle').checked;
        if (useGPS) {
            if ('geolocation' in navigator) {
                setStatus('Acquiring GPS...', '#f59e0b');
                gpsWatchId = navigator.geolocation.watchPosition(pos => {
                    setStatus(`GPS Active. ±${Math.round(pos.coords.accuracy)}m`, '#4ade80');
                    userCoords = L.latLng(pos.coords.latitude, pos.coords.longitude);
                    if (!userMarker) userMarker = L.circleMarker(userCoords, { color: '#3498db', radius: 8, fillOpacity: 1, stroke: true, weight: 2, color: '#fff' }).addTo(map);
                    else userMarker.setLatLng(userCoords);
                    if (currentHoleKey) updatePathsAndDistances();
                }, err => {
                    setStatus('GPS Error or Denied.', '#f87171');
                    document.getElementById('gpsToggle').checked = false;
                    toggleGPS();
                }, { enableHighAccuracy: true });
            }
        } else {
            if (gpsWatchId !== null) { navigator.geolocation.clearWatch(gpsWatchId); gpsWatchId = null; }
            if (userMarker) { map.removeLayer(userMarker); userMarker = null; }
            userCoords = null;
            setStatus('GPS Disabled.', '#f59e0b');
            if (currentHoleKey) updatePathsAndDistances();
        }
    }

    function getCenter(coords) {
        if (coords.length === 1) return coords[0];
        let latSum = 0, lngSum = 0;
        coords.forEach(c => { latSum += c[0]; lngSum += c[1]; });
        return [latSum / coords.length, lngSum / coords.length];
    }
</script>
</body>
</html>
